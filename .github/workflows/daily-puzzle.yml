name: Daily Samurai Sudoku

# Generates one new puzzle per day, commits it, and pushes to main.
# Vercel's Git integration then auto-deploys, so /games/samurai always
# serves a fresh "today" puzzle and the archive keeps growing.

on:
  schedule:
    - cron: '15 0 * * *' # 00:15 UTC every day
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-puzzle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate today's puzzle
        run: |
          TODAY="$(date -u +%F)"
          DOY="$(date -u +%j)"; DOY="$((10#$DOY))"
          DIFFS=(easy medium hard evil)
          DIFF="${DIFFS[$((DOY % 4))]}"
          echo "Generating $DIFF puzzle for $TODAY"
          pnpm exec tsx scripts/puzzles/generate.ts --id "$TODAY" --difficulty "$DIFF" --output public/puzzles

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/puzzles
          if git diff --cached --quiet; then
            echo "No new puzzle to commit."
          else
            git commit -m "chore(puzzles): daily puzzle $(date -u +%F)"
            git push
          fi
