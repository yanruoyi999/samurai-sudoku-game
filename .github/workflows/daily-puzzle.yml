name: Daily Samurai Sudoku

# Generates one new puzzle per day, commits it, and pushes to main.
# Vercel's Git integration then auto-deploys, so /games/samurai always
# serves a fresh "today" puzzle and the archive keeps growing.

on:
  schedule:
    - cron: '15 16 * * *' # 00:15 Asia/Shanghai every day
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-puzzle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.17.1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate today's puzzle
        run: |
          TODAY="$(TZ=Asia/Shanghai date +%F)"
          DOY="$(TZ=Asia/Shanghai date +%j)"; DOY="$((10#$DOY))"
          DIFFS=(easy medium hard evil)
          DIFF="${DIFFS[$((DOY % 4))]}"
          echo "Generating $DIFF puzzle for $TODAY"
          echo "PUZZLE_DATE=$TODAY" >> "$GITHUB_ENV"
          pnpm exec tsx scripts/puzzles/generate.ts \
            --id "$TODAY" \
            --difficulty "$DIFF" \
            --output public/puzzles \
            --skip-existing

      - name: Validate puzzle corpus
        run: pnpm validate-puzzles

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/puzzles
          if git diff --cached --quiet; then
            echo "No new puzzle to commit."
          else
            git commit -m "chore(puzzles): daily puzzle ${PUZZLE_DATE}"
            git pull --rebase origin main
            git push
          fi
